name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The build needs the same VITE_ keys as a local build (.env is not in
      # git). They come from GitHub repo secrets: Settings → Secrets and
      # variables → Actions. Without them, Maps and web push ship broken.
      - run: npm install && npm run build
        env:
          VITE_GOOGLE_MAPS_PLATFORM_KEY: ${{ secrets.VITE_GOOGLE_MAPS_PLATFORM_KEY }}
          VITE_VAPID_KEY: ${{ secrets.VITE_VAPID_KEY }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GEN_LANG_CLIENT_0207804941 }}
          channelId: live
          projectId: gen-lang-client-0207804941
